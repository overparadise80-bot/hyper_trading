<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="900">
<title>주도섹터 모니터</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Malgun Gothic',sans-serif;background:#dceefb;padding:8px;}
.topbar{background:#0c447c;border-radius:8px;padding:7px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.topbar-title{color:#e6f1fb;font-size:14px;font-weight:500;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.live-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;display:inline-block;margin-right:4px;}
.live-label{color:#4ade80;font-size:11px;font-weight:500;}
.t-time{color:#b5d4f4;font-size:12px;}
.t-next{color:#85b7eb;font-size:11px;}
.legend{display:flex;gap:8px;align-items:center;margin-bottom:6px;padding:4px 10px;background:#e4f0fb;border-radius:6px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:3px;font-size:10px;color:#185fa5;}
.legend-sep{color:#aac8e8;font-size:10px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:7px;}
.card{background:#f0f7ff;border:1px solid #b5d4f4;border-radius:8px;overflow:hidden;}
.card-head{background:#185fa5;padding:7px 10px;display:flex;justify-content:space-between;align-items:center;}
.rank-badge{background:#0c447c;color:#b5d4f4;font-size:10px;font-weight:500;padding:1px 6px;border-radius:4px;margin-right:6px;}
.sector-name{color:#e6f1fb;font-size:13px;font-weight:500;}
.sector-meta{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.sector-rate-badge{background:#c8e4fb;border:1px solid #85b7eb;border-radius:8px;padding:2px 8px;font-size:13px;font-weight:500;}
.sector-sub{color:#85b7eb;font-size:10px;}
.card-body{padding:5px 8px;}
.stock-row{padding:4px 0;border-bottom:0.5px solid #c8e0f7;}
.stock-row:last-child{border-bottom:none;}
.stock-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.sname{font-size:12px;font-weight:500;color:#111;max-width:100px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sright{display:flex;gap:8px;align-items:center;}
.sprice{font-size:11px;color:#0c447c;}
.srate{font-size:12px;}
.samt{font-size:10px;color:#378add;}
.candle-wrap{position:relative;width:100%;height:14px;margin-bottom:2px;}
.candle-bg{position:absolute;left:0;right:0;top:50%;height:2px;background:#c8d8e8;transform:translateY(-50%);}
.candle-zero{position:absolute;top:0;width:2px;height:14px;background:#1a1a2e;border-radius:1px;}
.candle-wick{position:absolute;top:50%;height:2px;transform:translateY(-50%);}
.candle-body{position:absolute;top:2px;height:10px;border-radius:1px;min-width:2px;}
.prog-row{display:flex;align-items:center;gap:4px;}
.prog-tag{font-size:9px;font-weight:500;color:#666;}
.prog-val{font-size:9px;}
.footer{margin-top:7px;background:#0c447c;border-radius:8px;padding:5px 14px;display:flex;justify-content:space-between;align-items:center;}
.footer-txt{color:#85b7eb;font-size:10px;}
.footer-hi{color:#b5d4f4;font-weight:500;}
.waiting{text-align:center;padding:60px 20px;color:#185fa5;}
.waiting h2{font-size:18px;margin-bottom:12px;}
.waiting p{font-size:13px;color:#378add;}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-title">주도섹터 · 주도주 모니터</div>
  <div class="topbar-right">
    <span><span class="live-dot"></span><span class="live-label">LIVE</span></span>
    <span class="t-time" id="cur-time">--:--:--</span>
    <span class="t-next" id="nxt">장 시작 대기 중</span>
  </div>
</div>
<div class="legend">
  <span class="legend-item"><span style="width:18px;height:2px;background:#c8d8e8;display:inline-block;"></span>±30% 범위</span>
  <span class="legend-item"><span style="width:2px;height:12px;background:#1a1a2e;display:inline-block;border-radius:1px;"></span>전일종가(0%)</span>
  <span class="legend-item"><span style="width:10px;height:8px;background:#f5222d;display:inline-block;border-radius:1px;"></span>양봉</span>
  <span class="legend-item"><span style="width:10px;height:8px;background:#1677ff;display:inline-block;border-radius:1px;"></span>음봉</span>
  <span class="legend-sep">|</span>
  <span class="legend-item" style="color:#555;">PR = 프로그램 순매수/도(주)</span>
</div>

<div class="waiting">
  <h2>장 시작 전입니다</h2>
  <p>09:10 이후 첫 스캔이 완료되면 데이터가 표시됩니다.</p>
  <p style="margin-top:8px;">15분마다 자동 갱신</p>
</div>

<div class="footer">
  <span class="footer-txt">스캔: <span class="footer-hi" id="scan-ts">대기 중</span></span>
  <span class="footer-txt">거래대금 가중 평균 등락률 · 테마 TOP7</span>
  <span class="footer-txt">캔들: -30%~+30% 고정 범위</span>
</div>

<script>
function tick(){
  const d=new Date(), p=n=>String(n).padStart(2,'0');
  document.getElementById('cur-time').textContent=p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds());
}
tick();
setInterval(tick,1000);
</script>
</body>
</html>
